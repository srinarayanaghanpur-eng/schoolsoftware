name: Automated QA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Start Firebase Emulator
        run: |
          firebase emulators:start --project teacher-nara &
          sleep 10

      - name: Seed test data
        run: npx tsx tests/seed/seed-test-data.ts
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

      - name: Run Playwright tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: true
          BASE_URL: http://localhost:3000

      - name: Run Lighthouse
        run: npx lhci autorun || true

      - name: Generate QA Report
        run: npx tsx tests/qa-report-generator.ts

      - name: Run AI Visual Review
        run: npx tsx tests/ai-reviewer.ts || true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/reports/playwright-report/

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: tests/screenshots/

      - name: Upload QA Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report
          path: tests/reports/final-qa-report.md

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: tests/reports/lighthouse/
